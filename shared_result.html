<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowMe - Résultat partagé</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2ecc71;
            --primary-dark: #27ae60;
            --primary-light: #a8e6cf;
            --secondary: #3498db;
            --danger: #e74c3c;
            --text-dark: #2c3e50;
            --text-gray: #7f8c8d;
            --bg-light: #f0fdf4;
            --bg-white: #ffffff;
            --bg-gray: #f8f9fa;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, #e8f5e9 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 2rem);
        }

        .result-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        /* Classes de couleur */
        .green {
            --primary: hsl(140, 50%, 50%);
            --message-color: var(--primary);
            --background: hsl(140, 100%, 90%);
        }

        .red {
            --message-color: var(--text-dark);
            --primary: hsl(0, 50%, 50%);
            --background: hsl(0, 100%, 90%);
        }

        .yellow {
            --primary: hsl(61, 50%, 50%);
            --message-color: hsl(140, 50%, 50%);
            --background: hsl(61, 100%, 90%);
        }

        .score-box {
            width: 450px;
            min-height: 480px;
            padding: 2rem;
            background-color: var(--bg-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.6rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .message {
            color: var(--message-color);
            font-size: 1.6rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .score {
            width: 150px;
            height: 150px;
            background-color: var(--background);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--primary);
            border-radius: 50%;
            gap: .4rem;
        }

        .score .percent {
            font-size: 2.3rem;
            font-weight: 800;
            color: var(--primary);
        }

        .score .score-count {
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .result-details {
            text-align: center;
            font-size: 1rem;
            color: var(--text-dark);
            line-height: 1.8;
            background: var(--bg-gray);
            padding: 1rem;
            border-radius: var(--radius-sm);
            width: 100%;
        }

        .result-details .receiver-name {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .result-details .sender-name {
            color: var(--secondary);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .result-details .score-highlight {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.3rem;
        }

        .share-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--bg-gray);
            color: var(--text-dark);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            transform: translateY(-2px);
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
        }

        .btn-whatsapp:hover {
            background: #128C7E;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: var(--secondary);
            color: white;
        }

        .btn-copy:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .error-box {
            text-align: center;
            padding: 2rem;
        }

        .error-box h2 {
            color: var(--danger);
            margin-bottom: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .score-box {
            animation: fadeIn 0.5s ease;
        }

        .emoji {
            font-size: 2rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="result-page" id="resultPage">
            <div class="score-box" id="scoreBox">
                <div class="emoji" id="emoji"></div>
                <p class="message" id="message"></p>
                <div class="score">
                    <p class="percent" id="percent"></p>
                    <span class="score-count" id="scoreCount"></span>
                </div>
                <div class="result-details" id="resultDetails"></div>
                <div class="share-buttons">
                    <button class="btn btn-whatsapp" id="shareWhatsappBtn">📱 Partager sur WhatsApp</button>
                    <button class="btn btn-copy" id="copyResultBtn">📋 Copier le résultat</button>
                    <a href="./index.html" class="btn btn-secondary">🏠 Accueil</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Récupération des paramètres URL
        const urlParams = new URLSearchParams(window.location.search);
        
        // Données du résultat
        let resultData = {
            receiverName: "",
            senderName: "",
            score: 0,
            total: 0,
            percent: 0
        };

        // Fonction pour obtenir un message personnalisé
        function getMessage(percent) {
            if (percent >= 80) return "Exceptionnel! 🌟";
            if (percent >= 70) return "Félicitations! 🎉";
            if (percent >= 50) return "Pas mal! 👍";
            if (percent >= 30) return "Peut mieux faire! 📚";
            return "À réessayer! 💪";
        }

        // Fonction pour obtenir l'emoji correspondant
        function getEmoji(percent) {
            if (percent >= 80) return "🏆";
            if (percent >= 70) return "🎯";
            if (percent >= 50) return "😊";
            if (percent >= 30) return "🤔";
            return "😅";
        }

        // Fonction pour obtenir la classe CSS selon le score
        function getScoreClass(percent) {
            if (percent >= 70) return "green";
            if (percent >= 50) return "yellow";
            return "red";
        }

        // Fonction pour charger les données depuis l'URL
        function loadResultFromUrl() {
            // Essayer de lire depuis le paramètre 'data'
            const encodedData = urlParams.get("data");
            
            if (encodedData) {
                try {
                    const decoded = decodeURIComponent(encodedData);
                    const data = JSON.parse(decoded);
                    
                    resultData.receiverName = data.receiverName || "Quelqu'un";
                    resultData.senderName = data.senderName || "quelqu'un";
                    resultData.score = data.score || 0;
                    resultData.total = data.total || 0;
                    resultData.percent = data.total > 0 ? Math.round((data.score / data.total) * 100) : 0;
                    
                    return true;
                } catch (e) {
                    console.error("Erreur lors du parsing des données:", e);
                }
            }
            
            // Fallback: essayer de lire depuis les paramètres individuels
            const receiverName = urlParams.get("receiver");
            const senderName = urlParams.get("sender");
            const score = parseInt(urlParams.get("score"));
            const total = parseInt(urlParams.get("total"));
            
            if (receiverName && senderName && !isNaN(score) && !isNaN(total)) {
                resultData.receiverName = receiverName;
                resultData.senderName = senderName;
                resultData.score = score;
                resultData.total = total;
                resultData.percent = total > 0 ? Math.round((score / total) * 100) : 0;
                return true;
            }
            
            return false;
        }

        // Fonction pour afficher les résultats
        function displayResult() {
            const percentValue = resultData.percent;
            const message = getMessage(percentValue);
            const emoji = getEmoji(percentValue);
            const scoreClass = getScoreClass(percentValue);
            
            const scoreBox = document.getElementById("scoreBox");
            const emojiElement = document.getElementById("emoji");
            const messageElement = document.getElementById("message");
            const percentElement = document.getElementById("percent");
            const scoreCountElement = document.getElementById("scoreCount");
            const resultDetailsElement = document.getElementById("resultDetails");
            
            // Appliquer la classe de couleur
            scoreBox.classList.add(scoreClass);
            
            // Remplir les éléments
            emojiElement.textContent = emoji;
            messageElement.textContent = message;
            percentElement.textContent = percentValue + "%";
            scoreCountElement.textContent = `${resultData.score}/${resultData.total}`;
            
            // Générer le texte des détails
            resultDetailsElement.innerHTML = `
                <strong class="receiver-name">${escapeHtml(resultData.receiverName)}</strong> a obtenu 
                <strong class="score-highlight">${percentValue}%</strong> 
                (${resultData.score}/${resultData.total}) au questionnaire de<br>
                <strong class="sender-name">${escapeHtml(resultData.senderName)}</strong>
            `;
        }

        // Fonction utilitaire pour échapper le HTML
        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // Générer le message de partage
        function generateShareMessage() {
            return `🎯 *Résultat KnowMe* 🎯\n\n` +
                   `✨ ${resultData.receiverName} a obtenu ${resultData.percent}% (${resultData.score}/${resultData.total}) au questionnaire de ${resultData.senderName} ✨\n\n` +
                   `👉 ${window.location.href}`;
        }

        // Générer le lien de partage (pour WhatsApp Web)
        function generateWhatsAppLink() {
            const message = generateShareMessage();
            return `https://wa.me/?text=${encodeURIComponent(message)}`;
        }

        // Partager via WhatsApp
        function shareViaWhatsApp() {
            const whatsappLink = generateWhatsAppLink();
            window.open(whatsappLink, "_blank");
        }

        // Copier le résultat
        function copyResult() {
            const message = `🎯 Résultat KnowMe 🎯\n\n${resultData.receiverName} a obtenu ${resultData.percent}% (${resultData.score}/${resultData.total}) au questionnaire de ${resultData.senderName}`;
            
            navigator.clipboard.writeText(message).then(() => {
                showToast("Résultat copié dans le presse-papier! 📋");
            }).catch(() => {
                alert("Impossible de copier le résultat");
            });
        }

        // Afficher une notification toast
        function showToast(message) {
            const toast = document.createElement("div");
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--text-dark);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 0.9rem;
                z-index: 1000;
                animation: fadeIn 0.3s ease;
                white-space: nowrap;
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Initialisation
        window.addEventListener("DOMContentLoaded", () => {
            const hasData = loadResultFromUrl();
            
            if (!hasData || resultData.total === 0) {
                // Afficher une erreur si aucune donnée valide
                const resultPage = document.getElementById("resultPage");
                resultPage.innerHTML = `
                    <div class="error-box">
                        <h2>⚠️ Aucun résultat trouvé</h2>
                        <p>Ce lien de partage semble invalide ou expiré.</p>
                        <br>
                        <a href="./index.html" class="btn btn-primary">🏠 Retour à l'accueil</a>
                    </div>
                `;
                return;
            }
            
            displayResult();
            
            // Ajouter les écouteurs d'événements
            document.getElementById("shareWhatsappBtn").addEventListener("click", shareViaWhatsApp);
            document.getElementById("copyResultBtn").addEventListener("click", copyResult);
        });
    </script>
</body>

</html>
